# База правил регламента (Dev 3 владеет и расширяет).
# verified: false => демо-данные, НЕ официальный регламент (ADR-001 §5.5).
# title/category опущены намеренно — берутся из каталога компонентов (recommender/catalog.go).
# community_* — «народные» данные из отзывов владельцев (НЕ регламент), показываются рядом.
